<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>{% block title %}个人工作台{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0c29;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        /* 背景 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1;
        }
        
        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,12,41,0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .header-logo {
            font-size: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-nav { display: flex; gap: 4px; }
        .header-nav a {
            padding: 8px 16px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header-nav a:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
        .header-nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-time { font-size: 13px; color: rgba(255,255,255,0.45); }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        .logout-btn {
            background: rgba(255,70,70,0.2);
            color: rgba(255,150,150,0.9);
        }
        .logout-btn:hover {
            background: rgba(255,70,70,0.3);
            color: rgba(255,120,120,1);
        }
        
        /* 主内容 */
        .page-content {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
            background: transparent;
        }
        .page-title { font-size: 22px; font-weight: 400; color: #fff; margin-bottom: 24px; }
        
        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 16px; }
</style>
<style>
        /* 按钮 */
        .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 14px;
            cursor: pointer; transition: all 0.2s; text-decoration: none;
            display: inline-block; border: none;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-outline {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
        }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        
        /* 表单 */
        .form-input {
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.06);
            color: #e0e0e0;
            transition: border-color 0.2s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }
        .form-input:focus { outline: none; border-color: #64b5f6; }
        .form-select {
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.06);
            color: #e0e0e0;
        }
        
        /* 标签 */
        .tag { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
        .tag-blue { background: rgba(100,181,246,0.15); color: #64b5f6; }
        .tag-green { background: rgba(102,187,106,0.15); color: #66bb6a; }
        .tag-red { background: rgba(239,83,80,0.15); color: #ef5350; }
        .tag-gray { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-layer" id="bgLayer"></div>
    <div class="bg-overlay"></div>
    
    <header class="header">
        <div class="header-left">
            <a href="/" class="header-logo">
                <svg width="22" height="22" viewBox="0 0 64 64">
                    <defs><linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a73e8"/><stop offset="100%" style="stop-color:#4285f4"/></linearGradient></defs>
                    <rect width="64" height="64" rx="14" fill="url(#navGrad)"/>
                    <rect x="14" y="18" width="36" height="4" rx="2" fill="white"/>
                    <rect x="14" y="30" width="28" height="4" rx="2" fill="white" opacity="0.8"/>
                    <rect x="14" y="42" width="32" height="4" rx="2" fill="white" opacity="0.6"/>
                    <circle cx="48" cy="44" r="10" fill="#34a853"/>
                    <path d="M44 44 L47 47 L53 41" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                工作台
            </a>
            <nav class="header-nav">
                <a href="/" class="{% if active_page == 'home' %}active{% endif %}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页</a>
                <a href="/links" class="{% if active_page == 'links' %}active{% endif %}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>链接</a>
                <a href="/tasks" class="{% if active_page == 'tasks' %}active{% endif %}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>任务</a>
                <a href="/calendar" class="{% if active_page == 'calendar' %}active{% endif %}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>日历</a>
                {% if current_user and current_user.is_admin %}
                <a href="/admin/users" class="{% if active_page == 'admin' %}active{% endif %}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>管理</a>
                {% endif %}
            </nav>
        </div>
        <div class="header-right">
            {% if current_user %}
            <div class="user-info">
                <span>{{ current_user.username }}</span>
            </div>
            <a href="/logout" class="btn logout-btn" title="注销">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>注销
            </a>
            {% else %}
            <a href="/login" class="btn btn-outline">登录</a>
            <a href="/register" class="btn btn-primary">注册</a>
            {% endif %}
            <span class="header-time" id="headerTime"></span>
        </div>
    </header>
    
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
    
    <script>
    // 背景（与首页共享 localStorage）
    (function() {
        const url = localStorage.getItem('workbench_bg') || '';
        const layer = document.getElementById('bgLayer');
        if (url) {
            layer.style.backgroundImage = 'url(' + url + ')';
        } else {
            layer.style.backgroundImage = 'none';
            layer.style.background = 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)';
        }
    })();
    // 时间
    (function updateTime() {
        const el = document.getElementById('headerTime');
        if (!el) return;
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        el.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
        setTimeout(updateTime, 30000);
    })();
    </script>
</body>
</html>
